name: Build
on:
  push:
    branches: [master] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' 

      - run: npm ci
      - run: npm run build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/public
